<div class="admin-page">
  <div class="page-header">
    <div>
      <h1 class="page-title">{{ isEditMode ? 'Modifier' : 'Créer' }}</h1>
    </div>
    <a routerLink="/moderateur/projets" class="btn-secondary-modern">
      <i class="fas fa-arrow-left"></i> Retour
    </a>
  </div>

  <div style="width: 100%; margin: 0 auto;">
    <div class="card-page">
          <form [formGroup]="projetForm" (ngSubmit)="onSubmit()">
            
            <div class="mb-4">
              <label class="form-label fw-medium text-dark">Titre du Projet <span class="text-danger">*</span></label>
              <input type="text" class="form-control form-control-lg bg-light border-0" formControlName="titre">
            </div>

            <div class="mb-4">
              <label class="form-label fw-medium text-dark">Image de Couverture</label>
              <div class="d-flex align-items-center gap-3">
                <input type="file" class="form-control form-control-lg bg-light border-0" (change)="onFileSelected($event)" accept="image/*">
                <div *ngIf="isUploading" class="spinner-border text-primary" role="status"></div>
              </div>
              <div class="mt-2 text-success small" *ngIf="projetForm.get('imageUrl')?.value && !isUploading">
                <i class="bi bi-check-circle-fill"></i> Image chargée avec succès !
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label fw-medium text-dark">Description</label>
              <textarea class="form-control bg-light border-0" formControlName="description" rows="4"></textarea>
            </div>

            <div class="row g-4 mb-5">
              <div class="col-md-4">
                <label class="form-label fw-medium text-dark">Lien Publication (ID)</label>
                <input type="number" class="form-control form-control-lg bg-light border-0" formControlName="lienPublication" placeholder="Optionnel">
              </div>
              <div class="col-md-4">
                <label class="form-label fw-medium text-dark">Ordre d'affichage <span class="text-danger">*</span></label>
                <input type="number" class="form-control form-control-lg bg-light border-0" formControlName="ordre" min="0">
              </div>
              <div class="col-md-4 d-flex align-items-end">
                <div class="form-check form-switch p-3 bg-light rounded-3 d-flex align-items-center justify-content-between h-100 m-0 w-100">
                  <label class="form-check-label fw-medium text-dark" for="actifSwitch">Actif</label>
                  <input class="form-check-input ms-0 mt-0" type="checkbox" role="switch" id="actifSwitch" style="width: 40px; height: 20px;" formControlName="actif">
                </div>
              </div>
            </div>

            <div class="d-flex justify-content-end gap-3 pt-4 border-top">
              <button type="button" routerLink="/moderateur/projets" class="btn btn-light px-4 rounded-pill">Annuler</button>
              <button type="submit" class="btn btn-success px-4 rounded-pill shadow-sm" [disabled]="projetForm.invalid">
                <i class="bi bi-check-lg me-2"></i> {{ isEditMode ? 'Enregistrer' : 'Créer' }}
              </button>
            </div>

          </form>
    </div>
  </div>
</div>
