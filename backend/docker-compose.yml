version: '3.8'

services:

  # ─── MySQL ────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: ia_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ia_technology_db
      MYSQL_USER: ia_user
      MYSQL_PASSWORD: ia_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ia_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── phpMyAdmin ───────────────────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: ia_phpmyadmin
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
      UPLOAD_LIMIT: 50M
    ports:
      - "8888:80"
    networks:
      - ia_network

# ─── Volumes & Réseau ─────────────────────────────────────────────────────
volumes:
  mysql_data:
    driver: local

networks:
  ia_network:
    driver: bridge
