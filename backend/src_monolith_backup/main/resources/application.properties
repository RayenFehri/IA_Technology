# =============================================
# Server Configuration
# =============================================
server.port=8080

# =============================================
# MySQL Database Configuration
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/ia_technology_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# JPA / Hibernate Configuration
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# =============================================
# JWT Configuration
# =============================================
iatechnology.app.jwtSecret=iatechnologySecretKey_ChangeInProduction_MustBe256BitsLong_abcdefghijklmnopqrstuvwxyz123456
iatechnology.app.jwtExpirationMs=86400000

# =============================================
# File Upload (optional, for photo/fichierUrl)
# =============================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =============================================
# Logging
# =============================================
logging.level.org.springframework.security=DEBUG
logging.level.com.iatechnology=DEBUG

# =============================================
# SpringDoc / Swagger UI
# =============================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true

